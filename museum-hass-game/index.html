<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 HASS: Skill Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        
        <div id="scene-layer">
            <div id="scene-bg"></div>
            <div id="hotspot-layer" class="hidden"></div>
        </div>

        <div id="ui-layer">
            <img id="dev-credit" src="assets/ui/credit.png" alt="Game Credit">
            
            <div id="progress-bar" class="hidden">
                <div id="progress-text">Cases Complete: 0/3</div>
            </div>

            <div id="dialogue-container" class="hidden">
                <img id="npc-portrait" src="" alt="NPC">
                <div id="dialogue-box-wrapper">
                    <img src="assets/ui/dialogue_box.png" id="dialogue-bg">
                    <div id="nameplate">
                        <img src="assets/ui/nameplate.png">
                        <span id="npc-name"></span>
                    </div>
                    <div id="dialogue-text"></div>
                    <button id="btn-next" class="img-btn hidden"><img src="assets/ui/text_next.png" alt="Next"></button>
                </div>
            </div>
        </div>

        <div id="overlay-layer">
            <div id="title-screen" class="overlay">
                <img id="title-logo" src="assets/ui/title_logo.png" alt="7 HASS Skill Quest">
                <div class="menu-buttons">
                    <button id="btn-start" class="img-btn"><img src="assets/ui/text_start.png" alt="Start"></button>
                    <button id="btn-help" class="img-btn"><img src="assets/ui/text_help.png" alt="Help"></button>
                </div>
            </div>

            <div id="source-modal" class="modal hidden">
                <div class="modal-content">
                    <h2 id="source-title"></h2>
                    
                    <div id="source-content-wrapper"></div>
                    
                    <div id="analysis-ui">
                        <hr>
                        <h4>Researcher's Analysis</h4>
                        <p><strong>1. Source Type:</strong></p>
                        <div class="analysis-row">
                            <button class="skill-btn" data-type="primary" onclick="selectSkill('type', 'primary', this)">Primary Source</button>
                            <button class="skill-btn" data-type="secondary" onclick="selectSkill('type', 'secondary', this)">Secondary Source</button>
                        </div>
                        <p><strong>2. HASS Category:</strong></p>
                        <div class="analysis-row">
                            <button class="skill-btn" data-cat="Social" onclick="selectSkill('cat', 'Social', this)">Social</button>
                            <button class="skill-btn" data-cat="Environmental" onclick="selectSkill('cat', 'Environmental', this)">Environmental</button>
                            <button class="skill-btn" data-cat="Cultural" onclick="selectSkill('cat', 'Cultural', this)">Cultural</button>
                        </div>
                    </div>

                    <div id="source-prompt-box">
                        <strong>Interpretation Prompt:</strong>
                        <p id="source-prompt"></p>
                    </div>
                    
                    <div class="modal-buttons">
                        <button id="btn-dismiss-source" class="img-btn"><img src="assets/ui/text_return.png" alt="Return"></button>
                        <button id="btn-close-source" class="img-btn"><img src="assets/ui/text_continue.png" alt="Done"></button>
                    </div>
                </div>
            </div>

            <div id="quiz-modal" class="modal hidden">
                <div class="modal-content">
                    <h3>Case Summary Findings</h3>
                    <p id="quiz-question"></p>
                    <div id="quiz-options"></div>
                </div>
            </div>

            <div id="final-screen" class="overlay hidden">
                <div class="modal-content">
                    <h1>Investigation Complete</h1>
                    <p>Excellent work, young researcher. You have correctly analysed the evidence and completed your report for the Parklands Regional Heritage Museum!</p>
                    <button id="btn-replay" class="img-btn"><img src="assets/ui/text_replay.png" alt="Replay"></button>
                </div>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
