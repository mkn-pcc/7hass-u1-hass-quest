<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 HASS: Skill Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="scene-bg"></div>

        <div id="ui-layer">
            <div id="title-screen" class="overlay">
                <img id="title-logo" src="assets/ui/title_logo.png" alt="7 HASS Skill Quest">
                <div class="menu-buttons">
                    <button id="btn-start" class="img-btn"><img src="assets/ui/text_start.png" alt="Start"></button>
                    <button id="btn-help" class="img-btn"><img src="assets/ui/text_help.png" alt="Help"></button>
                </div>
            </div>

            <div id="progress-bar" class="hidden">
                <div id="progress-text">Cases Complete: 0/3</div>
            </div>

            <div id="dialogue-container" class="hidden">
                <img id="npc-portrait" src="assets/portraits/curator.png" alt="NPC">
                <div id="dialogue-box-wrapper">
                    <img src="assets/ui/dialogue_box.png" id="dialogue-bg">
                    <div id="nameplate">
                        <img src="assets/ui/nameplate.png">
                        <span id="npc-name">CURATOR</span>
                    </div>
                    <div id="dialogue-text"></div>
                    <button id="btn-next" class="img-btn hidden"><img src="assets/ui/text_next.png"></button>
                </div>
            </div>

            <div id="hotspot-layer" class="hidden"></div>

            <div id="source-modal" class="modal hidden">
                <div class="modal-content">
                    <h2 id="source-title"></h2>
                    <p id="source-type"></p>
                    <div id="source-image-container"></div>
                    <div id="source-description"></div>
                    <div id="source-prompt-box">
                        <strong>Analysis Prompt:</strong>
                        <p id="source-prompt"></p>
                    </div>
                    <button id="btn-close-source" class="img-btn"><img src="assets/ui/text_continue.png"></button>
                </div>
            </div>

            <div id="quiz-modal" class="modal hidden">
                <div class="modal-content">
                    <h3>Case Summary</h3>
                    <p id="quiz-question"></p>
                    <div id="quiz-options"></div>
                </div>
            </div>

            <div id="final-screen" class="overlay hidden">
                <div class="modal-content">
                    <h1>Investigation Complete</h1>
                    <p>Excellent work, Researcher. You have successfully analysed the sources!</p>
                    <button id="btn-replay" class="img-btn"><img src="assets/ui/text_replay.png"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
